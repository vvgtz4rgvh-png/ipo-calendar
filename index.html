<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>IPO Manager</title>
<meta name="description" content="IPOの申込・抽選・購入・成績を一元管理する個人用ダッシュボード">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1976d2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="IPO Manager">
<link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
<link rel="icon" href="assets/icons/favicon-32.png" sizes="32x32">

<link rel="stylesheet" href="style.css">
<script src="auth.js" defer></script>
</head>
<body>

<div class="app">

  <header class="app-header">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l6-6 4 4 8-8"/><path d="M15 7h6v6"/></svg>
      </span>
      <span class="brand-name">IPO Manager</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="lock-btn" aria-label="ロックする" onclick="window.ipoLockNow()">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
      </button>
      <button class="icon-btn" id="theme-toggle" aria-label="表示テーマを切り替え">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      </button>
    </div>
  </header>

  <main>

    <section aria-labelledby="today-heading" class="section">
      <h2 id="today-heading" class="section-title">今日やること</h2>
      <div class="today-grid" id="today-grid">
        <!-- JS: today task cards -->
      </div>
    </section>

    <section aria-labelledby="active-heading" class="section">
      <div class="section-head">
        <h2 id="active-heading" class="section-title">管理中IPO</h2>
        <span class="section-count" id="active-count">0件</span>
      </div>
      <div class="ipo-list" id="active-list">
        <!-- JS: active IPO cards -->
      </div>
      <p class="empty-state" id="active-empty" hidden>現在、管理中のIPOはありません。</p>
    </section>

    <section aria-labelledby="past-heading" class="section">
      <button class="section-head collapsible" id="past-toggle" aria-expanded="false" aria-controls="past-list">
        <h2 id="past-heading" class="section-title">上場済IPO</h2>
        <svg class="chevron" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <div class="ipo-list" id="past-list" hidden>
        <!-- JS: past IPO cards -->
      </div>
    </section>

    <section aria-labelledby="stats-heading" class="section">
      <h2 id="stats-heading" class="section-title">年間成績</h2>
      <div class="stats-grid" id="stats-grid">
        <!-- JS: annual stats -->
      </div>
    </section>

    <section aria-labelledby="monthly-heading" class="section" id="monthly-section" hidden>
      <h2 id="monthly-heading" class="section-title">月別損益</h2>
      <div class="monthly-chart-card">
        <div id="monthly-chart"><!-- JS: SVG bar chart --></div>
      </div>
    </section>

  </main>

  <footer class="app-footer">
    <span>IPO Manager</span>
    <span class="dot" aria-hidden="true">·</span>
    <span>Version 2.1.0</span>
    <span class="dot" aria-hidden="true">·</span>
    <span>GitHub Pages</span>
  </footer>

</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script src="script.js"></script>
</body>
</html>
